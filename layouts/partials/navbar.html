<div class="container site-navbar">
  <a class="site-navbar-logo" href="{{ .Site.Home.RelPermalink }}" aria-label="{{ .Site.Title }} home">
    {{ readFile (printf "static/%s" .Site.Params.Logo) | safeHTML }}
  </a>

  <button class="site-menu-toggle" type="button" aria-expanded="false" aria-controls="site-menu">
    <span></span><span></span><span></span>
    <span class="sr-only">Toggle navigation</span>
  </button>

  <nav id="site-menu" aria-label="Main navigation">
    {{ $currentPage := . }}
    {{ range .Site.Menus.main }}
    <a class="{{ if or ($currentPage.IsMenuCurrent " main" .) ($currentPage.HasMenuCurrent "main" .) }}is-active{{ end
      }}" href="{{ .URL }}" title="{{ .Title }}">{{ .Name }}</a>
    {{ end }}
  </nav>
</div>

<script>
  (() => {
    const button = document.querySelector('.site-menu-toggle');
    const menu = document.querySelector('#site-menu');
    if (!button || !menu) return;
    button.addEventListener('click', () => {
      const open = button.getAttribute('aria-expanded') === 'true';
      button.setAttribute('aria-expanded', String(!open));
      menu.classList.toggle('is-open', !open);
    });
    document.documentElement.classList.add('js-enabled');
  })();
</script>
