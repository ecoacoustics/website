{{- $user := .Get 0 -}}
{{- $id := .Get 1 -}}
{{- $file := .Get 2 | default "" -}}
{{- $src := printf "https://gist.github.com/%s/%s.js" $user $id -}}
{{- if $file -}}
  {{- $src = printf "%s?file=%s" $src (urlquery $file) -}}
{{- end -}}
<script type="text/javascript" src="{{ $src | safeURL }}"></script>
